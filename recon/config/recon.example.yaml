# Optional overrides only — defaults are already real discovery + real scanners
# (see recon/core/defaults.py). Use this file to tune workers, webhooks, wordlists, etc.

domain: example.com

# Stream subprocess stdout/stderr to console (prefixed) while capturing for parsers
stream_subprocess_output: true

bootstrap:
  auto_install: true

tools:
  subfinder: subfinder
  assetfinder: assetfinder
  amass: amass
  waybackurls: waybackurls
  shuffledns: shuffledns
  httpx: httpx
  nuclei: nuclei
  subjack: subjack
  subzy: subzy
  ffuf: ffuf
  wafw00f: wafw00f
  python3: python3

# Defaults if omitted: crtsh, subfinder, waybackurls
# discovery:
#   providers:
#     - mock

# Defaults if omitted: httpx_scanner, wafw00f_scanner, nuclei_scanner
# scanning:
#   plugins:
#     - mock_scanner

discovery:
  enabled: true
  expand_subdomains: true
  timeout_seconds: 300
  wordlist: ""
  resolvers: ""

scanning:
  enabled: true
  parallel_workers: 4
  rate_limit_per_second: 10
  skip_duplicate_targets: true
  timeout_seconds: 300
  ffuf_wordlist: ""
  secretfinder_script: ""
  wafw00f_aggressive: false

alerts:
  webhook_url: ""
  min_severity: high
  batch_summaries: true
  deduplicate: true

execution:
  mode: sequential
  max_retries: 3
  retry_backoff_seconds: 1.0

storage:
  backend: json
  output_dir: output

log_level: INFO
log_json: false
