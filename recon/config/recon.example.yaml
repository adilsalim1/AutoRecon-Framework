# Optional overrides — built-in defaults already run the full pipeline (all discovery
# sources, URL collection, every registered scanner, JS analysis). Narrow scope here if needed.

domain: example.com

stream_subprocess_output: true

bootstrap:
  auto_install: true

tools:
  subfinder: subfinder
  assetfinder: assetfinder
  waybackurls: waybackurls
  github_subdomains: github-subdomains
  shuffledns: shuffledns
  gau: gau
  katana: katana
  hakrawler: hakrawler
  httpx: httpx
  nuclei: nuclei
  subjack: subjack
  subzy: subzy
  ffuf: ffuf
  wafw00f: wafw00f
  python3: python3
  naabu: naabu
  nmap: nmap
  whatweb: whatweb
  wappalyzer: wappalyzer
  # semgrep: semgrep
  # trufflehog: trufflehog

# Defaults (if omitted): crtsh, subfinder, waybackurls, assetfinder, github_subdomains,
# shuffledns, massdns — add amass_passive + tools.amass if you want OWASP Amass again.
# shuffledns needs discovery.wordlist + discovery.resolvers.
discovery:
  enabled: true
  expand_subdomains: true
  # single_target_mode: true   # or CLI --single-domain: no subfinder/crt.sh; scan only `domain`
  timeout_seconds: 300
  # Passive amass often needs >5m; default 1800. Increase if logs show exit 124 (subprocess timeout).
  # amass_timeout_seconds: 1800
  wordlist: ""
  resolvers: ""

# Defaults: enabled; gau, waybackurls, katana, hakrawler
collection:
  enabled: true
  providers:
    - gau
    - waybackurls
    - katana
    - hakrawler
  timeout_seconds: 300
  max_urls_per_host: 300
  max_crawl_seeds: 15
  linkfinder_script: ""

# Defaults: all scanners (httpx, wafw00f, nuclei, whatweb, wappalyzer, naabu, nmap,
# subjack, subzy, ffuf, vhost_ffuf, secretfinder); live_hosts_only false; waf_skip_aggressive false;
# js_analysis_enabled true; js_snitch_enabled true (TruffleHog+Semgrep on collected JS URLs;
#   see https://github.com/vavkamil/js-snitch — install trufflehog + semgrep or use --install-tools);
# ffuf wordlist = recon/data/ffuf-quick.txt unless overridden.
scanning:
  enabled: true
  live_hosts_only: false
  parallel_workers: 4
  rate_limit_per_second: 10
  skip_duplicate_targets: true
  timeout_seconds: 300
  # ffuf_wordlist: ""   # empty in YAML → bundled recon/data/ffuf-quick.txt
  # vhost_ffuf_wordlist: ""   # empty → recon/data/wl-vhost.txt
  # vhost_ffuf_filter_size: 4242
  # vhost_ffuf_autocalibrate: true
  # naabu_top_ports: 100
  # nmap_top_ports: 50
  # nmap_scripts: ""
  # nmap_scan_timeout_seconds: 900
  secretfinder_script: ""
  # secretfinder_max_js_urls: 40  # 0 = only https://host; else run SecretFinder -i on collected JS URLs per host
  wafw00f_aggressive: true
  # waf_skip_aggressive: false   # default: run aggressive scanners even on WAF hosts
  # api_endpoint_priority: true
  # max_js_analyze: 40
  # url_secret_scan_max: 500
  # js_snitch_enabled: true
  # js_snitch_max_urls: 500
  # js_snitch_repo: ""   # path to vavkamil/js-snitch clone for custom-semgrep-templates
  # js_snitch_fetch_timeout_seconds: 30
  # js_snitch_trufflehog_timeout_seconds: 900
  # js_snitch_semgrep_timeout_seconds: 600

alerts:
  webhook_url: ""
  min_severity: high
  batch_summaries: true
  deduplicate: true
  # Full hosts/URLs/paths + findings as Discord attachments (not truncated samples).
  discord_attach_full_file_exports: true
  # If true, duplicates inventory + final exports to every webhook (noisy). Default: ASSETS + SUMMARY only.
  discord_broadcast_file_exports_all_channels: false

execution:
  mode: sequential
  max_retries: 3
  retry_backoff_seconds: 1.0

storage:
  backend: json
  output_dir: output

log_level: INFO
log_json: false
